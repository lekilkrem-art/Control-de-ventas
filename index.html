<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de Ventas</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0d14;
            --card-bg: #141722;
            --text-main: #ffffff;
            --text-muted: #787f95;
            --green: #2ecc71;
            --blue: #2575fc;
            --purple: #6a11cb;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--text-main);
        }

        /* Contenedor simulando la pantalla del iPhone */
        .phone-container {
            width: 390px;
            height: 844px;
            background-color: var(--bg-color);
            border-radius: 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            position: relative;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 4px solid #2d2d2d;
        }

        /* Header */
        .header {
            padding: 40px 24px 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            font-size: 20px;
            font-weight: 600;
        }

        .icon-btn {
            background: none;
            border: none;
            color: var(--text-main);
            cursor: pointer;
        }

        /* Fecha */
        .date-container {
            text-align: center;
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 6px;
        }

        /* Contenido con Scroll si es necesario */
        .content {
            padding: 0 20px;
            flex: 1;
            overflow-y: auto;
            padding-bottom: 100px;
        }

        /* Grid superior de tarjetas */
        .top-cards {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 12px;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 16px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
        }

        .card-title {
            font-size: 11px;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .card-value {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 8px;
        }

        .card-stat {
            font-size: 11px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .stat-up { color: var(--green); }
        .stat-blue { color: #3498db; }
        .stat-purple { color: #a29bfe; }

        /* Tarjeta Mensual Ancha */
        .card-wide {
            grid-column: span 2;
            flex-direction: row;
            align-items: center;
            justify-content: space-between;
            background: linear-gradient(135deg, #141722 0%, #1a1528 100%);
            margin-bottom: 20px;
        }

        .circle-icon {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background-color: rgba(106, 17, 203, 0.2);
            border: 1px solid var(--purple);
            display: flex;
            justify-content: center;
            align-items: center;
            color: #a29bfe;
        }

        /* Sección de Gráfico */
        .chart-section {
            background-color: var(--card-bg);
            border-radius: 20px;
            padding: 16px;
            margin-bottom: 12px;
        }

        .chart-title {
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 20px;
        }

        .chart-title span {
            color: var(--text-muted);
            font-weight: normal;
        }

        .chart-container {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            height: 140px;
            padding-top: 20px;
            position: relative;
        }

        .bar-wrapper {
            display: flex;
            flex-direction: column;
